<header class="site-header">
  <a href="{{ "/" | relURL }}" class="site-logo">{{ .Site.Title }}</a>
  <nav class="site-nav" aria-label="Main navigation">
    {{ range .Site.Menus.main -}}
    <a href="{{ .URL | relURL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a>
    {{- end }}
  </nav>
</header>

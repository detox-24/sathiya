  <div class="poetry-body">
    <p>Between the lamp and the window<br>
there is a country I return to —</p>
<p>not sleep, not waking,<br>
but that particular amber</p>
<p>where the day<br>
unstitches itself from me</p>
<p>and I become<br>
briefly, briefly</p>
<p>nobody&rsquo;s.</p>

  </div>
